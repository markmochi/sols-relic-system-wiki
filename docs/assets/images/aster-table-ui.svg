<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="560" viewBox="0 0 1100 560" role="img" aria-labelledby="t d">
  <title id="t">Aster Table interface guide</title><desc id="d">The Aster Table screen showing relic and material inputs, equipment, inventory, and upgrade preview information.</desc>
  <defs><linearGradient id="bg" x2="1" y2="1"><stop stop-color="#070b12"/><stop offset="1" stop-color="#101824"/></linearGradient><linearGradient id="p" x2="0" y2="1"><stop stop-color="#182636"/><stop offset="1" stop-color="#0d151f"/></linearGradient><filter id="g"><feGaussianBlur stdDeviation="4" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter><clipPath id="core"><rect width="52" height="52"/></clipPath></defs>
  <rect width="1100" height="560" fill="url(#bg)"/><path d="M28 24H1072V536H28Z" fill="none" stroke="#edc96d" stroke-opacity=".32"/>

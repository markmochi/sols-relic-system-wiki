<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="430" viewBox="0 0 1200 430" role="img" aria-labelledby="title desc">
  <title id="title">Sol's Relic System progression loop</title>
  <desc id="desc">Acquire gear, inspect its roll, level with Aster Cores, improve at milestones, then reroll, ascend, keep, or recycle.</desc>
  <defs>
    <linearGradient id="bg" x2="1" y2="1"><stop stop-color="#070b12"/><stop offset=".55" stop-color="#111e2b"/><stop offset="1" stop-color="#090d16"/></linearGradient>
    <linearGradient id="cyan" x2="1"><stop stop-color="#52eef2"/><stop offset="1" stop-color="#2b8b99"/></linearGradient>
    <linearGradient id="gold" x2="1"><stop stop-color="#f0d479"/><stop offset="1" stop-color="#9c6538"/></linearGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <clipPath id="frame"><rect width="58" height="58"/></clipPath>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto"><path d="M0 0L10 5L0 10Z" fill="#53edf3"/></marker>
    <pattern id="grid" width="28" height="28" patternUnits="userSpaceOnUse"><path d="M28 0H0V28" fill="none" stroke="#53edf3" stroke-opacity=".045"/></pattern>
  </defs>
  <rect width="1200" height="430" fill="url(#bg)"/>
  <rect width="1200" height="430" fill="url(#grid)"/>
  <path d="M35 22H1165L1182 39V391L1165 408H35L18 391V39Z" fill="none" stroke="#edc96d" stroke-opacity=".42" stroke-width="2"/>
  <text x="600" y="54" text-anchor="middle" fill="#edc96d" font-family="Georgia,serif" font-size="28" font-weight="bold">THE RELIC PROGRESSION LOOP</text>
  <text x="600" y="79" text-anchor="middle" fill="#8fa0b5" font-family="Arial,sans-serif" font-size="13" letter-spacing="3">FROM FIRST DROP TO FINAL BUILD</text>

  <g font-family="Arial,sans-serif">
    <g transform="translate(55 118)"><path d="M12 0H178L190 12V158L178 170H12L0 158V12Z" fill="#111b29" stroke="#53edf3" stroke-opacity=".48"/><circle cx="95" cy="51" r="31" fill="#53edf3" fill-opacity=".09" stroke="#53edf3" stroke-opacity=".5"/><path d="M78 66L105 27L112 34L86 72Z" fill="#dbe8f5"/><path d="M75 70L91 76L83 84L70 74Z" fill="#edc96d"/><text x="95" y="110" text-anchor="middle" fill="#eaf2fb" font-size="18" font-weight="bold">1 · ACQUIRE</text><text x="95" y="135" text-anchor="middle" fill="#91a1b5" font-size="13">Eligible weapon or armor</text></g>
    <path d="M250 203H290" stroke="#53edf3" stroke-width="2" marker-end="url(#arrow)"/>
    <g transform="translate(305 118)"><path d="M12 0H178L190 12V158L178 170H12L0 158V12Z" fill="#111b29" stroke="#53edf3" stroke-opacity=".48"/><text x="95" y="52" text-anchor="middle" fill="#53edf3" font-size="35">✦</text><text x="95" y="84" text-anchor="middle" fill="#edc96d" font-size="13">MAIN + SUB-STATS</text><text x="95" y="110" text-anchor="middle" fill="#eaf2fb" font-size="18" font-weight="bold">2 · INSPECT</text><text x="95" y="135" text-anchor="middle" fill="#91a1b5" font-size="13">Keep the right stat types</text></g>
    <path d="M500 203H540" stroke="#53edf3" stroke-width="2" marker-end="url(#arrow)"/>
    <g transform="translate(555 118)"><path d="M12 0H178L190 12V158L178 170H12L0 158V12Z" fill="#111b29" stroke="#53edf3" stroke-opacity=".48"/><g transform="translate(66 17)" clip-path="url(#frame)"><image href="data:image/png;base64," width="58" height="696" image-rendering="pixelated"/></g><text x="95" y="110" text-anchor="middle" fill="#eaf2fb" font-size="18" font-weight="bold">3 · LEVEL</text><text x="95" y="135" text-anchor="middle" fill="#91a1b5" font-size="13">Spend Aster Cores</text></g>
    <path d="M750 203H790" stroke="#53edf3" stroke-width="2" marker-end="url(#arrow)"/>
    <g transform="translate(805 118)"><path d="M12 0H178L190 12V158L178 170H12L0 158V12Z" fill="#111b29" stroke="#53edf3" stroke-opacity=".48"/><g fill="none" stroke="#edc96d" filter="url(#glow)"><circle cx="95" cy="52" r="27"/><path d="M95 20V84M63 52H127M72 29L118 75M118 29L72 75"/></g><text x="95" y="110" text-anchor="middle" fill="#eaf2fb" font-size="18" font-weight="bold">4 · MILESTONE</text><text x="95" y="135" text-anchor="middle" fill="#91a1b5" font-size="13">Add or upgrade a sub-stat</text></g>
    <path d="M1000 203H1040" stroke="#53edf3" stroke-width="2" marker-end="url(#arrow)"/>
    <g transform="translate(1055 118)"><path d="M12 0H78L90 12V158L78 170H12L0 158V12Z" fill="#111b29" stroke="#edc96d" stroke-opacity=".55"/><text x="45" y="62" text-anchor="middle" fill="#edc96d" font-size="36">◆</text><text x="45" y="103" text-anchor="middle" fill="#eaf2fb" font-size="14" font-weight="bold">MAX</text><text x="45" y="126" text-anchor="middle" fill="#91a1b5" font-size="11">Choose</text></g>
  </g>

  <path d="M1100 292V335H235" fill="none" stroke="#edc96d" stroke-opacity=".7" stroke-width="2" marker-end="url(#arrow)"/>
  <g font-family="Arial,sans-serif" transform="translate(250 320)">
    <g><rect width="200" height="63" rx="3" fill="#161323" stroke="#b478ed"/><text x="100" y="25" text-anchor="middle" fill="#d6b6f3" font-size="16" font-weight="bold">REROLL</text><text x="100" y="46" text-anchor="middle" fill="#9187a1" font-size="12">Redistribute with Dust</text></g>
    <g transform="translate(225)"><rect width="200" height="63" rx="3" fill="#211b10" stroke="#edc96d"/><text x="100" y="25" text-anchor="middle" fill="#f2d681" font-size="16" font-weight="bold">ASCEND</text><text x="100" y="46" text-anchor="middle" fill="#a99a76" font-size="12">Raise rarity, start +0</text></g>
    <g transform="translate(450)"><rect width="200" height="63" rx="3" fill="#102018" stroke="#70dc9a"/><text x="100" y="25" text-anchor="middle" fill="#89ecad" font-size="16" font-weight="bold">KEEP</text><text x="100" y="46" text-anchor="middle" fill="#83a591" font-size="12">Equip and build around it</text></g>
    <g transform="translate(675)"><rect width="200" height="63" rx="3" fill="#211315" stroke="#ed6f72"/><text x="100" y="25" text-anchor="middle" fill="#ef898b" font-size="16" font-weight="bold">RECYCLE</text><text x="100" y="46" text-anchor="middle" fill="#a98588" font-size="12">Recover Tier III cores</text></g>
  </g>
</svg>


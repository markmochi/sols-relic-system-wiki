<svg xmlns="http://www.w3.org/2000/svg" width="930" height="690" viewBox="0 0 930 690" role="img" aria-labelledby="t d">
  <title id="t">Example max-level ascended relic tooltip</title><desc id="d">A code-faithful tooltip mock showing relic level, reroll count, ascension, main stat, four sub-stats, upgrade dots, max EXP, set bonuses, and Aster Table hint.</desc>
  <defs><linearGradient id="bg" x2="1" y2="1"><stop stop-color="#071019"/><stop offset="1" stop-color="#130b1c"/></linearGradient><filter id="g"><feGaussianBlur stdDeviation="4" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter></defs>
  <rect width="930" height="690" fill="url(#bg)"/><g opacity=".08" stroke="#53edf3"><path d="M0 80H930M0 160H930M0 240H930M0 320H930M0 400H930M0 480H930M0 560H930M0 640H930M80 0V690M160 0V690M240 0V690M320 0V690M400 0V690M480 0V690M560 0V690M640 0V690M720 0V690M800 0V690M880 0V690"/></g>
  <text x="50" y="60" fill="#edc96d" font-family="Georgia,serif" font-size="27" font-weight="bold">RELIC TOOLTIP ANATOMY</text><text x="50" y="84" fill="#7e8ca0" font-family="Arial,sans-serif" font-size="11" letter-spacing="3">EXAMPLE · NETHERITE MATERIAL · EFFECTIVE VALUES</text>
  <!-- tooltip -->
  <g transform="translate(285 112)" font-family="Consolas,'Courier New',monospace">
    <path d="M5 0H392L400 8V544L392 552H5L0 547V5Z" fill="#0f0618" fill-opacity=".96" stroke="#5a2d85" stroke-width="3"/><path d="M8 7H391V544H8Z" fill="none" stroke="#211038" stroke-width="2"/>
    <text x="22" y="32" fill="#f0bd58" font-size="18" font-weight="bold">+16 Netherite Sword</text>
    <text x="22" y="57" fill="#9b9b9b" font-size="13">When in Main Hand:</text><text x="35" y="78" fill="#6d84a6" font-size="13">8 Attack Damage</text>
    <text x="200" y="107" text-anchor="middle" fill="#f0bd58" font-size="16" font-weight="bold">✦ RELIC +16 / 16 [R4] ✦</text>
    <text x="22" y="130" fill="#f0bd58" font-size="13" font-weight="bold">✧ ASCENDED IV</text>
    <path d="M20 143H380" stroke="#4a3f54"/>
    <text x="22" y="165" fill="#f0bd58" font-size="12">MAIN STAT</text>
    <text x="36" y="189" fill="#76d8ff" font-size="14">✦ Crit Rate</text><text x="330" y="189" text-anchor="end" fill="#76d8ff" font-size="14" font-weight="bold">+28.9%</text>
    <text x="22" y="220" fill="#f0bd58" font-size="12">SUB-STATS</text>
    <text x="36" y="246" fill="#d38cff" font-size="14">✧ Crit DMG</text><text x="265" y="246" text-anchor="end" fill="#53edf3" font-size="14">+26.2%</text><text x="285" y="246" fill="#53edf3" font-size="14">●●○○○</text>
    <text x="36" y="272" fill="#ff8f65" font-size="14">⚔ ATK%</text><text x="265" y="272" text-anchor="end" fill="#53edf3" font-size="14">+13.0%</text><text x="285" y="272" fill="#53edf3" font-size="14">●○○○○</text>
    <text x="36" y="298" fill="#ff7f91" font-size="14">♥ HP%</text><text x="265" y="298" text-anchor="end" fill="#ff7f91" font-size="14">+4.6%</text>
    <text x="36" y="324" fill="#ffe26a" font-size="14">⚡ ATK SPD</text><text x="265" y="324" text-anchor="end" fill="#53edf3" font-size="14">+6.7%</text><text x="285" y="324" fill="#53edf3" font-size="14">●○○○○</text>
    <path d="M20 342H380" stroke="#4a3f54"/>
    <text x="22" y="367" fill="#d2d2d2" font-size="13">EXP</text><text x="67" y="367" fill="#70dc9a" font-size="13">████████████</text><text x="205" y="367" fill="#f0bd58" font-size="13" font-weight="bold">MAX</text>
    <path d="M20 383H380" stroke="#4a3f54"/>
    <text x="22" y="408" fill="#70dc9a" font-size="13" font-weight="bold">Netherite Set (4 / 4)</text>
    <text x="36" y="433" fill="#70dc9a" font-size="12">✓ 2-Piece: +10% ATK</text>
    <text x="36" y="457" fill="#70dc9a" font-size="12">✓ 4-Piece: +15% ATK, +5% Crit</text><text x="51" y="478" fill="#70dc9a" font-size="12">Rate, +10% Crit DMG</text>
    <path d="M20 495H380" stroke="#4a3f54"/>
    <text x="22" y="520" fill="#777" font-size="12">Use Dust at the Aster Table to reroll</text>
  </g>
  <!-- annotations -->
  <g font-family="Arial,sans-serif" font-size="13"><path d="M285 218H170L125 185" fill="none" stroke="#edc96d"/><text x="43" y="171" fill="#edc96d" font-weight="bold">LEVEL + REROLLS</text><text x="43" y="189" fill="#8e9aad">[R4] = four Dust attempts</text><path d="M285 277H178L133 294" fill="none" stroke="#53edf3"/><text x="42" y="309" fill="#53edf3" font-weight="bold">MAIN STAT</text><text x="42" y="327" fill="#8e9aad">Type cannot be rerolled</text><path d="M285 382H188L145 399" fill="none" stroke="#b478ed"/><text x="43" y="414" fill="#b478ed" font-weight="bold">UPGRADE DOTS</text><text x="43" y="432" fill="#8e9aad">Milestone points on each stat</text><path d="M685 458H762L811 433" fill="none" stroke="#70dc9a"/><text x="755" y="400" fill="#70dc9a" font-weight="bold">EFFECTIVE VALUES</text><text x="755" y="418" fill="#8e9aad">Material/scaling already applied</text><path d="M685 553H775L822 571" fill="none" stroke="#edc96d"/><text x="750" y="593" fill="#edc96d" font-weight="bold">CUMULATIVE SET</text><text x="750" y="611" fill="#8e9aad">2pc + 4pc both apply</text></g>
</svg>


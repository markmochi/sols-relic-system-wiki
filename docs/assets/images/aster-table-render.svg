<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="580" viewBox="0 0 1000 580" role="img" aria-labelledby="t d">
  <title id="t">Aster Table model-based reconstruction</title><desc id="d">An isometric Aster Table reconstructed from the actual block model using the mod's stone, dark stone, gold, panel, rim, and top textures.</desc>
  <defs>
    <linearGradient id="bg" x2="1" y2="1"><stop stop-color="#070b12"/><stop offset=".5" stop-color="#10202a"/><stop offset="1" stop-color="#080c14"/></linearGradient>
    <radialGradient id="aura"><stop stop-color="#53edf3" stop-opacity=".22"/><stop offset="1" stop-color="#53edf3" stop-opacity="0"/></radialGradient>
    <pattern id="stone" width="32" height="32" patternUnits="userSpaceOnUse"><image href="data:image/png;base64," width="32" height="32" image-rendering="pixelated"/></pattern>
    <pattern id="dark" width="32" height="32" patternUnits="userSpaceOnUse"><image href="data:image/png;base64," width="32" height="32" image-rendering="pixelated"/></pattern>
    <pattern id="gold" width="32" height="32" patternUnits="userSpaceOnUse"><image href="data:image/png;base64," width="32" height="32" image-rendering="pixelated"/></pattern>
    <pattern id="panel" width="56" height="56" patternUnits="userSpaceOnUse"><image href="data:image/png;base64," width="56" height="56" image-rendering="pixelated"/></pattern>
    <pattern id="top" width="120" height="120" patternUnits="userSpaceOnUse"><image href="data:image/png;base64," width="120" height="120" image-rendering="pixelated"/></pattern>
    <filter id="glow"><feGaussianBlur stdDeviation="11" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="shadow"><feDropShadow dx="0" dy="20" stdDeviation="16" flood-opacity=".7"/></filter>
  </defs>
  <rect width="1000" height="580" fill="url(#bg)"/><ellipse cx="500" cy="310" rx="360" ry="250" fill="url(#aura)"/>
  <g fill="#53edf3" filter="url(#glow)" opacity=".8"><circle cx="260" cy="230" r="3"/><circle cx="735" cy="182" r="2"/><circle cx="774" cy="323" r="3"/><circle cx="214" cy="349" r="2"/><path d="M294 150l5 10l10 5l-10 5l-5 10l-5-10l-10-5l10-5Z"/><path d="M717 391l4 8l8 4l-8 4l-4 8l-4-8l-8-4l8-4Z"/></g>
  <g transform="translate(0 15)" filter="url(#shadow)">
    <!-- base from model's layered stone plinth -->
    <path d="M250 388L500 470L750 388L500 310Z" fill="url(#stone)" stroke="#6f8291" stroke-width="2"/>
    <path d="M250 388L500 470V516L250 432Z" fill="url(#dark)" stroke="#303b48" stroke-width="2"/>
    <path d="M750 388L500 470V516L750 432Z" fill="url(#stone)" stroke="#3c5260" stroke-width="2"/>
    <path d="M280 369L500 438L720 369L500 300Z" fill="url(#dark)" stroke="#1f2a34" stroke-width="2"/>
    <path d="M302 363L500 423L698 363L500 302Z" fill="url(#stone)" stroke="#667986"/>
    <!-- gold corner posts -->
    <g fill="url(#gold)" stroke="#cda65e" stroke-width="2"><path d="M269 377L293 385V445L269 437Z"/><path d="M731 377L707 385V445L731 437Z"/><path d="M482 436L500 442V506L482 500Z"/><path d="M518 436L500 442V506L518 500Z"/></g>
    <!-- central dark core -->
    <path d="M370 305L500 347L630 305L500 263Z" fill="url(#dark)" stroke="#293441"/>
    <path d="M370 305L500 347V410L370 368Z" fill="url(#panel)" stroke="#466b72" stroke-width="2"/>
    <path d="M630 305L500 347V410L630 368Z" fill="url(#panel)" stroke="#466b72" stroke-width="2"/>
    <!-- gold ribs -->
    <g fill="url(#gold)" stroke="#e2c36e"><path d="M387 302L399 306V374L387 370Z"/><path d="M465 328L477 332V400L465 396Z"/><path d="M613 302L601 306V374L613 370Z"/><path d="M535 328L523 332V400L535 396Z"/></g>
    <!-- upper rim and enchanted top -->
    <path d="M286 244L500 312L714 244L500 176Z" fill="url(#stone)" stroke="#71838e" stroke-width="2"/>
    <path d="M286 244L500 312V337L286 269Z" fill="url(#dark)" stroke="#29333d"/>
    <path d="M714 244L500 312V337L714 269Z" fill="url(#stone)" stroke="#3b505c"/>
    <path d="M318 236L500 292L682 236L500 180Z" fill="url(#top)" stroke="#53edf3" stroke-width="3" filter="url(#glow)"/>
    <path d="M318 236L500 292L682 236" fill="none" stroke="#edc96d" stroke-width="5" stroke-opacity=".72"/>
    <!-- four rim tabs from the model -->
    <g fill="url(#stone)" stroke="#667986"><path d="M427 181L500 157L573 181L500 204Z"/><path d="M318 236L279 223L318 211L357 223Z"/><path d="M682 236L643 223L682 211L721 223Z"/><path d="M427 291L500 268L573 291L500 314Z"/></g>
  </g>
  <text x="500" y="52" text-anchor="middle" fill="#edc96d" font-family="Georgia,serif" font-size="30" font-weight="bold">ASTER TABLE</text>
  <text x="500" y="79" text-anchor="middle" fill="#8da1b4" font-family="Arial,sans-serif" font-size="12" letter-spacing="3">MODEL-BASED RECONSTRUCTION · REAL MOD TEXTURES</text>
  <g transform="translate(735 482)" font-family="Arial,sans-serif"><rect width="215" height="52" fill="#0a111b" stroke="#53edf3" stroke-opacity=".35"/><text x="16" y="21" fill="#53edf3" font-size="11" font-weight="bold">BLOCK CODE</text><text x="16" y="39" fill="#9baabd" font-size="11">Light 8 · Stone · 2.5 / 6.0</text></g>
</svg>


<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="450" viewBox="0 0 1100 450" role="img" aria-labelledby="t d">
  <title id="t">Dust reroll flow</title><desc id="d">Validate a max-level Epic or better relic, consume Dust, redistribute upgrade points, then keep old or new stats.</desc>
  <defs><linearGradient id="bg" x2="1"><stop stop-color="#080b12"/><stop offset=".5" stop-color="#171329"/><stop offset="1" stop-color="#080b12"/></linearGradient><marker id="arr" markerWidth="9" markerHeight="9" refX="8" refY="4.5" orient="auto"><path d="M0 0L9 4.5L0 9Z" fill="#b478ed"/></marker><filter id="gl"><feGaussianBlur stdDeviation="4" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter><clipPath id="f"><rect width="74" height="74"/></clipPath></defs>
  <rect width="1100" height="450" fill="url(#bg)"/><path d="M20 20H1080V430H20Z" fill="none" stroke="#b478ed" stroke-opacity=".4"/><text x="550" y="55" text-anchor="middle" fill="#dbc1f4" font-family="Georgia,serif" font-size="28" font-weight="bold">DUST OF ENLIGHTENMENT</text><text x="550" y="80" text-anchor="middle" fill="#8f84a1" font-family="Arial" font-size="12" letter-spacing="3">REDISTRIBUTE POWER · DO NOT REPLACE STAT TYPES</text>
  <g font-family="Arial,sans-serif">
    <g transform="translate(55 127)"><path d="M10 0H210L220 10V150L210 160H10L0 150V10Z" fill="#121623" stroke="#b478ed"/><text x="110" y="34" text-anchor="middle" fill="#d5b8ee" font-size="17" font-weight="bold">1 · VALIDATE</text><text x="20" y="68" fill="#aab4c4" font-size="13">✓ Epic or higher</text><text x="20" y="94" fill="#aab4c4" font-size="13">✓ Maximum level</text><text x="20" y="120" fill="#aab4c4" font-size="13">✓ Has sub-stats</text><text x="20" y="146" fill="#aab4c4" font-size="13">✓ Survival mode</text></g>
    <path d="M285 207H345" stroke="#b478ed" stroke-width="2" marker-end="url(#arr)"/>
    <g transform="translate(360 127)"><path d="M10 0H210L220 10V150L210 160H10L0 150V10Z" fill="#121623" stroke="#b478ed"/><g transform="translate(73 37)" clip-path="url(#f)" filter="url(#gl)"><image href="data:image/png;base64," width="74" height="888" image-rendering="pixelated"/></g><text x="110" y="28" text-anchor="middle" fill="#d5b8ee" font-size="17" font-weight="bold">2 · COMMIT DUST</text><text x="110" y="137" text-anchor="middle" fill="#9c90ad" font-size="12">Pity selections on every 5th</text></g>
    <path d="M590 207H650" stroke="#b478ed" stroke-width="2" marker-end="url(#arr)"/>
    <g transform="translate(665 127)"><path d="M10 0H210L220 10V150L210 160H10L0 150V10Z" fill="#121623" stroke="#b478ed"/><text x="110" y="34" text-anchor="middle" fill="#d5b8ee" font-size="17" font-weight="bold">3 · REDISTRIBUTE</text><text x="18" y="71" fill="#f0bd58" font-size="13">OLD  0 · 3 · 0 · 1</text><text x="18" y="99" fill="#53edf3" font-size="13">NEW 2 · 1 · 1 · 0</text><path d="M18 116H202" stroke="#3b4050"/><text x="110" y="142" text-anchor="middle" fill="#aab4c4" font-size="12">Same total: 4 points</text></g>
    <path d="M895 207H948" stroke="#b478ed" stroke-width="2" marker-end="url(#arr)"/>
    <g transform="translate(963 127)"><path d="M8 0H74L82 8V152L74 160H8L0 152V8Z" fill="#121623" stroke="#edc96d"/><text x="41" y="45" text-anchor="middle" fill="#edc96d" font-size="24">?</text><text x="41" y="80" text-anchor="middle" fill="#e8edf5" font-size="13" font-weight="bold">CHOOSE</text><text x="41" y="108" text-anchor="middle" fill="#70dc9a" font-size="11">NEW</text><text x="41" y="132" text-anchor="middle" fill="#93a0b6" font-size="11">OLD</text></g>
  </g>
  <path d="M1004 292V333H286" fill="none" stroke="#edc96d" stroke-opacity=".65" stroke-width="2" marker-end="url(#arr)"/>
  <g transform="translate(300 318)" font-family="Arial,sans-serif"><rect width="500" height="78" rx="4" fill="#0c111b" stroke="#edc96d" stroke-opacity=".38"/><text x="250" y="29" text-anchor="middle" fill="#edc96d" font-size="15" font-weight="bold">BOTH CHOICES CONSUME DUST + INCREMENT REROLL COUNT</text><text x="250" y="54" text-anchor="middle" fill="#9aa6b8" font-size="13">Keep Old protects the stats, not the resource or pity progress.</text></g>
</svg>


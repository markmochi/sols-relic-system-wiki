<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="520" viewBox="0 0 1080 520" role="img" aria-labelledby="t d">
  <title id="t">Phantom weapon slots and combat lock</title><desc id="d">Inventory with two phantom slots, an active green state, an inactive gray state, and a red combat-locked state with a countdown badge.</desc>
  <defs><linearGradient id="bg" x2="1" y2="1"><stop stop-color="#080c13"/><stop offset="1" stop-color="#111b28"/></linearGradient><filter id="g"><feGaussianBlur stdDeviation="4" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter></defs>
  <rect width="1080" height="520" fill="url(#bg)"/><path d="M22 20H1058V500H22Z" fill="none" stroke="#53edf3" stroke-opacity=".28"/>
  <text x="540" y="52" text-anchor="middle" fill="#edc96d" font-family="Georgia,serif" font-size="28" font-weight="bold">PHANTOM WEAPON SLOTS</text><text x="540" y="75" text-anchor="middle" fill="#8492a6" font-family="Arial" font-size="11" letter-spacing="3">STORED WEAPONS OVERRIDE HAND STATS</text>
  <!-- inventory -->
  <g transform="translate(80 110)" font-family="Arial,sans-serif"><path d="M8 0H540L548 8V322L540 330H8L0 322V8Z" fill="#c6c6c6" stroke="#fff" stroke-width="3"/><path d="M14 14H534V316H14Z" fill="#9b9b9b"/>
    <text x="27" y="35" fill="#333" font-size="13" font-weight="bold">Crafting</text><rect x="36" y="57" width="145" height="145" fill="#777" stroke="#555"/><circle cx="108" cy="113" r="28" fill="#b88c6a"/><path d="M78 144Q108 124 138 144V187H78Z" fill="#3b5573"/>
    <!-- armor --> <g fill="#666" stroke="#e1e1e1" stroke-width="2"><rect x="204" y="57" width="44" height="44"/><rect x="204" y="105" width="44" height="44"/><rect x="204" y="153" width="44" height="44"/><rect x="204" y="201" width="44" height="44"/></g>
    <!-- offhand --> <rect x="260" y="201" width="44" height="44" fill="#666" stroke="#e1e1e1" stroke-width="2"/>
    <!-- phantom slots -->
    <g transform="translate(260 112)"><rect width="42" height="42" fill="#373737" stroke="#00cc00" stroke-width="4"/><path d="M13 31L27 8L33 14L19 36Z" fill="#e4edf5"/><circle cx="21" cy="45" r="4" fill="#00ff00"/><text x="58" y="17" fill="#173b20" font-size="12" font-weight="bold">MAIN</text><text x="58" y="34" fill="#27532f" font-size="11">ACTIVE</text></g>
    <g transform="translate(260 58)"><rect width="42" height="42" fill="#373737" stroke="#666" stroke-width="4"/><path d="M13 31L27 8L33 14L19 36Z" fill="#87919b"/><circle cx="21" cy="45" r="4" fill="#444"/><text x="58" y="17" fill="#444" font-size="12" font-weight="bold">OFFHAND</text><text x="58" y="34" fill="#555" font-size="11">INACTIVE</text></g>
    <!-- inventory grid --> <g transform="translate(27 263)" fill="#666" stroke="#eee"><rect width="44" height="44"/><rect x="48" width="44" height="44"/><rect x="96" width="44" height="44"/><rect x="144" width="44" height="44"/><rect x="192" width="44" height="44"/><rect x="240" width="44" height="44"/><rect x="288" width="44" height="44"/><rect x="336" width="44" height="44"/><rect x="384" width="44" height="44"/><rect x="432" width="44" height="44"/></g>
  </g>
  <!-- instructions -->
  <g transform="translate(690 118)" font-family="Arial,sans-serif"><path d="M10 0H280L290 10V190L280 200H10L0 190V10Z" fill="#0c141f" stroke="#53edf3" stroke-opacity=".55"/><text x="22" y="34" fill="#53edf3" font-size="15" font-weight="bold">INVENTORY CONTROLS</text><text x="22" y="70" fill="#d9e2ef" font-size="14">Left click</text><text x="112" y="70" fill="#92a0b3" font-size="14">place / take / swap</text><text x="22" y="101" fill="#d9e2ef" font-size="14">Right click</text><text x="112" y="101" fill="#92a0b3" font-size="14">toggle active</text><path d="M22 119H268" stroke="#354454"/><text x="22" y="147" fill="#70dc9a" font-size="13">● green = replacing hand stats</text><text x="22" y="174" fill="#777" font-size="13">● gray = stored, not applied</text></g>
  <!-- locked badge -->
  <g transform="translate(725 350)" font-family="Arial,sans-serif" filter="url(#g)"><rect width="68" height="68" fill="#0e191b" stroke="#e6cf7a" stroke-width="3"/><rect x="8" y="8" width="52" height="36" fill="#2b1412"/><path d="M22 25Q34 9 46 25V38H22Z" fill="none" stroke="#e8e5d4" stroke-width="5"/><rect x="18" y="30" width="32" height="20" fill="#eba23a"/><circle cx="34" cy="38" r="4" fill="#301606"/><text x="34" y="62" text-anchor="middle" fill="#ffd98b" font-size="13" font-weight="bold">30s</text><text x="91" y="25" fill="#ed6f72" font-size="16" font-weight="bold">COMBAT LOCK</text><text x="91" y="49" fill="#a6b2c3" font-size="13">Editing and toggling denied</text></g>
  <path d="M637 278H690" stroke="#53edf3"/><text x="638" y="301" fill="#7d8ca1" font-family="Arial" font-size="11">Slots are player data—not duplicated equipment</text>
</svg>


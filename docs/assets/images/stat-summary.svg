<svg xmlns="http://www.w3.org/2000/svg" width="1060" height="600" viewBox="0 0 1060 600" role="img" aria-labelledby="t d">
  <title id="t">Relic Stat Summary screen</title><desc id="d">A visual representation of the I-key Stat Summary with offensive, defensive, utility, and active set totals.</desc>

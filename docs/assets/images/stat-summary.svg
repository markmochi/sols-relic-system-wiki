    <g transform="translate(286 104)"><rect width="238" height="210" fill="#101925" stroke="#70dc9a" stroke-opacity=".55"/><text x="18" y="31" fill="#70dc9a" font-size="14" font-weight="bold">⛨ DEFENSE</text><path d="M18 43H220" stroke="#3a4554"/><text x="18" y="75" fill="#8ad6ff">DEF</text><text x="213" y="75" text-anchor="end" fill="#f1f4f8" font-weight="bold">+4.2 / +25.0%</text><text x="18" y="108" fill="#ff7f91">HP</text><text x="213" y="108" text-anchor="end" fill="#f1f4f8" font-weight="bold">+8.4 / +15.0%</text><text x="18" y="141" fill="#9cc6d8">Material peak</text><text x="213" y="141" text-anchor="end" fill="#f0bd58" font-weight="bold">Netherite 1.12×</text><text x="18" y="174" fill="#9cc6d8">Offhand</text><text x="213" y="174" text-anchor="end" fill="#f1f4f8" font-weight="bold">50% efficient</text></g>
    <g transform="translate(544 104)"><rect width="238" height="210" fill="#101925" stroke="#53edf3" stroke-opacity=".55"/><text x="18" y="31" fill="#53edf3" font-size="14" font-weight="bold">➤ UTILITY</text><path d="M18 43H220" stroke="#3a4554"/><text x="18" y="75" fill="#53edf3">Move Speed</text><text x="213" y="75" text-anchor="end" fill="#70dc9a" font-weight="bold">+20.0% CAP</text><text x="18" y="108" fill="#a8ef87">Jump Boost</text><text x="213" y="108" text-anchor="end" fill="#f1f4f8" font-weight="bold">+18.0%</text><text x="18" y="141" fill="#9ad779">Luck</text><text x="213" y="141" text-anchor="end" fill="#f1f4f8" font-weight="bold">+12.0%</text><text x="18" y="174" fill="#9cc6d8">Phantom Main</text><text x="213" y="174" text-anchor="end" fill="#70dc9a" font-weight="bold">ACTIVE</text></g>
